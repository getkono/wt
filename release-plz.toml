# release-plz: automated, Conventional-Commit-driven releases for wt.
# Docs: https://release-plz.dev
#
# On every push to master, .github/workflows/release-plz.yml either:
#   - opens/updates a "release PR" that bumps the version and updates CHANGELOG.md, or
#   - (when that PR is merged) cuts a GitHub Release + `v{version}` tag, which in turn
#     triggers the prebuilt-binary build and the Homebrew tap refresh.
[workspace]
# crates.io publishing is OFF for now: the crate name `wt` is already taken on
# crates.io (see RELEASING.md → "Enabling crates.io"). Everything else — CHANGELOG,
# release PR, git tag, GitHub Release — still runs.
#
# Two independent knobs, both required:
#
# `git_only = true` controls VERSION DETECTION: read the last released version from
# the `v{version}` git tags, NOT from crates.io. Without it, the unpublished crate
# reads as 0.0.0 in the registry, so release-plz saw local 1.0.0 > 0.0.0, concluded
# "only changelog will be updated", and never opened a release PR for the feat:/fix:
# commits piling up after v1.0.0. Requires release-plz >= 0.3.151 (the action ships a
# newer one). https://release-plz.dev/docs/config
#
# Skipping `cargo publish` is controlled separately by `publish = false` in
# `Cargo.toml` — contrary to the docs, `git_only` does NOT reliably skip publishing
# (release-plz#2693), and without it the release job dies on a missing
# CARGO_REGISTRY_TOKEN before it can cut the tag.
git_only = true

# Maintain CHANGELOG.md from Conventional Commits (keep-a-changelog format).
changelog_update = true

# Cut a GitHub Release (with generated notes) and a `v{version}` git tag per release.
# The tag name is referenced by the binary/Homebrew jobs, so pin it explicitly.
git_release_enable = true
git_tag_enable = true
git_tag_name = "v{{ version }}"

# `wt` exposes a library API but is shipped only as a binary and is not published,
# so cargo-semver-checks would only add noise.
semver_check = false
