# release-plz: automated, Conventional-Commit-driven releases for wt.
# Docs: https://release-plz.dev
#
# On every push to master, .github/workflows/release-plz.yml either:
#   - opens/updates a "release PR" that bumps the version and updates CHANGELOG.md, or
#   - (when that PR is merged) cuts a GitHub Release + `v{version}` tag, which in turn
#     triggers the prebuilt-binary build and the Homebrew tap refresh.
[workspace]
# crates.io publishing is ON: the crate ships as `kono-wt` (see RELEASING.md). The
# release job authenticates via crates.io Trusted Publishing (OIDC) — no registry
# token secret; see the `id-token: write` permission in release-plz.yml.
#
# `publish = true` (release-plz's default) runs `cargo publish` AND cuts the tag +
# GitHub Release. We do NOT set `git_only` here: it forces version detection off the
# git tags and is mutually exclusive with `publish = true`. While `wt` was unpublished
# it was needed (the registry read the crate as 0.0.0, so release-plz saw local
# 1.0.0 > 0.0.0 and never opened a release PR); now that `kono-wt` is on crates.io,
# registry-based version detection works normally. https://release-plz.dev/docs/config
publish = true

# Maintain CHANGELOG.md from Conventional Commits (keep-a-changelog format).
changelog_update = true

# Cut a GitHub Release (with generated notes) and a `v{version}` git tag per release.
# The tag name is referenced by the binary/Homebrew jobs, so pin it explicitly.
git_release_enable = true
git_tag_enable = true
git_tag_name = "v{{ version }}"

# `kono-wt` exposes a library API but is shipped only as a binary, so
# cargo-semver-checks would only add noise.
semver_check = false
