# Lefthook git hooks — https://github.com/evilmartians/lefthook
#
# pre-commit auto-fixes formatting and linting; pre-push is the final gate
# (checks + tests + coverage). cargo fmt/clippy operate on the whole workspace,
# so the glob only triggers the command when .rs files are staged — no file
# arguments are passed.
#
# git invokes hooks with GIT_DIR (and friends) exported, and git honours those
# over a `-C <dir>` argument. The suite spawns real `git` against throwaway temp
# repos, so the test/coverage steps strip the inherited GIT_* location variables
# first — otherwise those subprocesses would target this repo instead of their
# sandboxes. (`run_git` in src/testutil.rs scrubs the same set as defence in
# depth.)

pre-commit:
  piped: true # run format-fix, then lint-fix (formatting can affect lint output)
  commands:
    format-fix:
      priority: 1
      glob: "**/*.rs"
      stage_fixed: true # re-stage files modified by the fix
      run: just format
    lint-fix:
      priority: 2
      glob: "**/*.rs"
      stage_fixed: true
      run: just lint-fix

pre-push:
  commands:
    format-check:
      run: just format-check
    lint-check:
      run: just lint
    test:
      run: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE -u GIT_OBJECT_DIRECTORY -u GIT_ALTERNATE_OBJECT_DIRECTORIES -u GIT_COMMON_DIR -u GIT_NAMESPACE -u GIT_CEILING_DIRECTORIES -u GIT_PREFIX just test
    coverage:
      run: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE -u GIT_OBJECT_DIRECTORY -u GIT_ALTERNATE_OBJECT_DIRECTORIES -u GIT_COMMON_DIR -u GIT_NAMESPACE -u GIT_CEILING_DIRECTORIES -u GIT_PREFIX just coverage
