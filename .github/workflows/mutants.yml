name: Mutants

# Mutation testing is informational and slow, so this workflow is intentionally
# NON-BLOCKING (continue-on-error) and, on pull requests, runs only over the code
# the PR changed (`--in-diff`). A weekly schedule runs a fuller sweep.
#
# The `sendit` dependency (getkono/sendit) is a public git dependency fetched over
# HTTPS, so no SSH deploy key is required to build.

on:
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC — weekly fuller sweep

jobs:
  mutants:
    name: Mutation testing (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so --in-diff can reach the base branch
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: jdx/mise-action@v2
      - name: Mutants on changed code
        if: github.event_name == 'pull_request'
        run: |
          git diff "origin/${{ github.base_ref }}...HEAD" > mutants.diff
          cargo mutants --in-diff mutants.diff --no-shuffle -j 2
      - name: Full mutants sweep (scheduled)
        if: github.event_name == 'schedule'
        run: cargo mutants --no-shuffle -j 2
      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-report
          path: mutants.out/
