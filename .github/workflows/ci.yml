name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  commit-lint:
    name: Conventional commits
    runs-on: ubuntu-latest
    # Only PRs carry an unmerged commit series worth linting; pushes to master are history.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # convco needs full history to walk the commit range
      # mise provisions convco (see mise.toml); the install is cached across runs.
      - uses: jdx/mise-action@v2
      - name: Conventional Commits check
        run: convco check ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}

  check:
    name: Format, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: jdx/mise-action@v2
      - name: Check formatting
        run: mise run format-check
      - name: Clippy
        run: mise run lint
      - name: Test
        run: mise run test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: jdx/mise-action@v2
      - name: Collect coverage data
        run: cargo llvm-cov --no-report
      - name: Generate lcov report and enforce threshold
        run: cargo llvm-cov report --ignore-filename-regex 'src/main\.rs' --lcov --output-path lcov.info --fail-under-lines 80
      - name: Coverage summary
        run: cargo llvm-cov report --ignore-filename-regex 'src/main\.rs' --summary-only
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
